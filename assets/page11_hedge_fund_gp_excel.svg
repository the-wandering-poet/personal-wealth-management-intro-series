<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Illustrative hedge fund GP statistics in Excel-style table</title>
  <desc id="desc">Three illustrative funds with annual returns, max drawdown, Sharpe ratio and fee structures.</desc>
  <style>
    text{font-family:Inter,Arial,Helvetica,sans-serif}
    .ui{fill:#5f6b73;font-size:13px;font-weight:650}
    .col{fill:#59636b;font-size:13px;font-weight:750}
    .row{fill:#59636b;font-size:13px;font-weight:650}
    .head{fill:#182025;font-size:16px;font-weight:820}
    .cell{fill:#182025;font-size:17px;font-weight:620}
    .fund{fill:#182025;font-size:18px;font-weight:850}
    .good{fill:#0b6f3a;font-size:17px;font-weight:780}
    .risk{fill:#a33d23;font-size:17px;font-weight:780}
  </style>
  <rect width="900" height="520" rx="10" fill="#f3f5f7"/>
  <rect x="20" y="18" width="860" height="484" rx="8" fill="#ffffff" stroke="#cdd5df"/>
  <rect x="20" y="18" width="860" height="36" rx="8" fill="#e9edf2"/>
  <circle cx="42" cy="36" r="6" fill="#ef6f5e"/>
  <circle cx="62" cy="36" r="6" fill="#e7b849"/>
  <circle cx="82" cy="36" r="6" fill="#69b96d"/>
  <text x="112" y="41" class="ui">Fund statistics demo.xlsx</text>

  <rect x="40" y="74" width="820" height="38" fill="#f8fafc" stroke="#dbe2ea"/>
  <text x="55" y="98" class="ui">A1</text>
  <rect x="98" y="84" width="746" height="18" rx="3" fill="#ffffff" stroke="#dbe2ea"/>
  <text x="110" y="98" class="ui">=Select managers by full-cycle record, net return, risk, and fee terms</text>

  <rect x="40" y="124" width="48" height="42" fill="#f1f4f7" stroke="#dbe2ea"/>
  <text x="61" y="150" class="col"> </text>
  <g>
    <rect x="88" y="124" width="150" height="42" fill="#f1f4f7" stroke="#dbe2ea"/>
    <rect x="238" y="124" width="150" height="42" fill="#f1f4f7" stroke="#dbe2ea"/>
    <rect x="388" y="124" width="150" height="42" fill="#f1f4f7" stroke="#dbe2ea"/>
    <rect x="538" y="124" width="150" height="42" fill="#f1f4f7" stroke="#dbe2ea"/>
    <rect x="688" y="124" width="172" height="42" fill="#f1f4f7" stroke="#dbe2ea"/>
    <text x="156" y="150" text-anchor="middle" class="col">A</text>
    <text x="313" y="150" text-anchor="middle" class="col">B</text>
    <text x="463" y="150" text-anchor="middle" class="col">C</text>
    <text x="613" y="150" text-anchor="middle" class="col">D</text>
    <text x="774" y="150" text-anchor="middle" class="col">E</text>
  </g>

  <g>
    <rect x="40" y="166" width="48" height="54" fill="#f1f4f7" stroke="#dbe2ea"/>
    <rect x="40" y="220" width="48" height="54" fill="#f1f4f7" stroke="#dbe2ea"/>
    <rect x="40" y="274" width="48" height="54" fill="#f1f4f7" stroke="#dbe2ea"/>
    <rect x="40" y="328" width="48" height="54" fill="#f1f4f7" stroke="#dbe2ea"/>
    <text x="64" y="198" text-anchor="middle" class="row">1</text>
    <text x="64" y="252" text-anchor="middle" class="row">2</text>
    <text x="64" y="306" text-anchor="middle" class="row">3</text>
    <text x="64" y="360" text-anchor="middle" class="row">4</text>
  </g>

  <g stroke="#dbe2ea">
    <rect x="88" y="166" width="150" height="54" fill="#d9eadf"/>
    <rect x="238" y="166" width="150" height="54" fill="#d9eadf"/>
    <rect x="388" y="166" width="150" height="54" fill="#d9eadf"/>
    <rect x="538" y="166" width="150" height="54" fill="#d9eadf"/>
    <rect x="688" y="166" width="172" height="54" fill="#d9eadf"/>
    <text x="108" y="198" class="head">Fund</text>
    <text x="258" y="190" class="head">2021-2025</text>
    <text x="258" y="208" class="head">annual return</text>
    <text x="408" y="190" class="head">Max</text>
    <text x="408" y="208" class="head">drawdown</text>
    <text x="558" y="198" class="head">Sharpe</text>
    <text x="708" y="198" class="head">Fee structure</text>
  </g>

  <g stroke="#dbe2ea">
    <rect x="88" y="220" width="150" height="54" fill="#ffffff"/>
    <rect x="238" y="220" width="150" height="54" fill="#ffffff"/>
    <rect x="388" y="220" width="150" height="54" fill="#ffffff"/>
    <rect x="538" y="220" width="150" height="54" fill="#ffffff"/>
    <rect x="688" y="220" width="172" height="54" fill="#ffffff"/>
    <text x="108" y="254" class="fund">Fund A</text>
    <text x="258" y="254" class="good">18.6%</text>
    <text x="408" y="254" class="cell">-8.2%</text>
    <text x="558" y="254" class="good">1.35</text>
    <text x="708" y="254" class="cell">2% + 20%</text>

    <rect x="88" y="274" width="150" height="54" fill="#ffffff"/>
    <rect x="238" y="274" width="150" height="54" fill="#ffffff"/>
    <rect x="388" y="274" width="150" height="54" fill="#ffffff"/>
    <rect x="538" y="274" width="150" height="54" fill="#ffffff"/>
    <rect x="688" y="274" width="172" height="54" fill="#ffffff"/>
    <text x="108" y="308" class="fund">Fund B</text>
    <text x="258" y="308" class="good">24.8%</text>
    <text x="408" y="308" class="cell">-13.5%</text>
    <text x="558" y="308" class="good">1.55</text>
    <text x="708" y="308" class="cell">0% + 25%</text>

    <rect x="88" y="328" width="150" height="54" fill="#ffffff"/>
    <rect x="238" y="328" width="150" height="54" fill="#ffffff"/>
    <rect x="388" y="328" width="150" height="54" fill="#ffffff"/>
    <rect x="538" y="328" width="150" height="54" fill="#ffffff"/>
    <rect x="688" y="328" width="172" height="54" fill="#ffffff"/>
    <text x="108" y="362" class="fund">Fund C</text>
    <text x="258" y="362" class="good">41.2%</text>
    <text x="408" y="362" class="risk">-24.0%</text>
    <text x="558" y="362" class="cell">0.95</text>
    <text x="708" y="362" class="cell">0% + 25% over 6%</text>
  </g>
</svg>
